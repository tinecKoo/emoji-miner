<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Miner v1.2</title>
    <style>
        :root {
            --bg: #0a0a1a;
            --accent: #7c3aed;
        }
        body {
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: #fff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        h1 {
            text-align: center;
            font-size: 3rem;
            margin: 10px 0;
            text-shadow: 0 0 25px var(--accent);
        }
        nav {
            text-align: center;
            margin: 25px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        nav button {
            padding: 12px 22px;
            background: #1f1f2e;
            border: none;
            color: white;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
        }
        nav button.active {
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
        }
        .tab { display: none; }
        .tab.active { display: block; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 18px;
            max-width: 1200px;
            margin: 30px auto;
        }
        .emoji-card {
            background: #16213e;
            border-radius: 20px;
            padding: 18px;
            font-size: 4rem;
            text-align: center;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        .emoji-card:hover {
            transform: scale(1.12);
        }
        .battle-log {
            background: #111827;
            padding: 20px;
            border-radius: 16px;
            min-height: 220px;
            max-width: 700px;
            margin: 25px auto;
            text-align: left;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>Emoji Miner — v1.2</h1>
    
    <nav>
        <button onclick="switchTab(0)" class="active">Mine</button>
        <button onclick="switchTab(1)">Gallery</button>
        <button onclick="switchTab(2)">Leaderboard</button>
        <button onclick="switchTab(3)">Themes</button>
        <button onclick="switchTab(4)">Equipment</button>
        <button onclick="switchTab(5)">Dungeon</button>
    </nav>

    <!-- Mine Tab -->
    <div id="tab0" class="tab active">
        <p style="text-align:center; font-size:1.8rem;">Next in: <span id="timer" style="color:#ffd700;">60s</span></p>
        <div style="text-align:center; margin:20px;">
            <button onclick="claimNow()" style="padding:16px 40px; font-size:1.3rem; background:#7c3aed; border:none; border-radius:14px; cursor:pointer;">Claim Early</button>
        </div>
        <div class="grid" id="collection"></div>
    </div>

    <!-- Gallery Tab -->
    <div id="tab1" class="tab">
        <h2>📖 Full Emoji Index</h2>
        <div class="grid" id="gallery"></div>
    </div>

    <!-- Leaderboard -->
    <div id="tab2" class="tab">
        <h2>🌍 Leaderboard</h2>
        <div id="leaderboard" style="max-width:600px; margin:30px auto; font-size:1.4rem;"></div>
    </div>

    <!-- Themes -->
    <div id="tab3" class="tab">
        <h2>🎨 Themes</h2>
        <div style="text-align:center;">
            <button onclick="setTheme(0)">Default</button>
            <button onclick="setTheme(1)">Kayn (LoL)</button>
            <button onclick="setTheme(2)">Marin</button>
            <button onclick="setTheme(3)">Tren Twins</button>
        </div>
    </div>

    <!-- Equipment -->
    <div id="tab4" class="tab">
        <h2>⚔️ Equipment - Swords</h2>
        <div class="grid" id="swords-grid"></div>
    </div>

    <!-- Dungeon -->
    <div id="tab5" class="tab">
        <h2>🏰 Dungeon - Goblin Lair</h2>
        <div id="battle-area" style="text-align:center;"></div>
        <div class="battle-log" id="battle-log">Ready for battle! Choose "Start Battle".</div>
        <div style="text-align:center;">
            <button onclick="startBattle()" style="padding:16px 40px; font-size:1.2rem;">Start Battle vs Goblin</button>
        </div>
    </div>

    <script>
        let collection = JSON.parse(localStorage.getItem('emojiCollection')) || {};

        const swords = [
            {name: "Wooden Sword", power: 8, emoji: "🪵"},
            {name: "Stone Sword", power: 15, emoji: "🪨"},
            {name: "Iron Sword", power: 25, emoji: "⚔️"},
            {name: "Diamond Sword", power: 40, emoji: "💎"},
            {name: "Crystal Sword", power: 60, emoji: "🔮"}
        ];

        function updateCollection() {
            const grid = document.getElementById('collection');
            grid.innerHTML = '';
            Object.values(collection).forEach(item => {
                const div = document.createElement('div');
                div.className = 'emoji-card';
                div.innerHTML = item.emoji;
                grid.appendChild(div);
            });
        }

        function buildGallery() {
            const g = document.getElementById('gallery');
            g.innerHTML = '';
            const list = ["😀","😂","❤️","🔥","⭐","🚀","🌈","🦄","⚡","👑","🐉","🌌","🌸","🦋","✨","🌑"];
            list.forEach(e => {
                const div = document.createElement('div');
                div.className = 'emoji-card';
                div.innerHTML = e;
                g.appendChild(div);
            });
        }

        function buildSwords() {
            const grid = document.getElementById('swords-grid');
            grid.innerHTML = '';
            swords.forEach(s => {
                const div = document.createElement('div');
                div.className = 'emoji-card';
                div.innerHTML = `${s.emoji}<br><small>${s.name}<br><b>${s.power} Power</b></small>`;
                grid.appendChild(div);
            });
        }

        function buildLeaderboard() {
            const unique = Object.keys(collection).length;
            document.getElementById('leaderboard').innerHTML = `
                <ol>
                    <li>1. TrenGod69 — 98 unique</li>
                    <li>2. ShadowKayn — 71 unique</li>
                    <li>3. MarinLover — 65 unique</li>
                    <li style="color:#c026d3"><strong>You — ${unique} unique 🔥</strong></li>
                </ol>
            `;
        }

        function setTheme(n) {
            if (n === 1) document.body.style.background = 'linear-gradient(135deg, #1e0a2e, #4c1d95)';
            else if (n === 2) document.body.style.background = 'linear-gradient(135deg, #fce7f3, #831843)';
            else if (n === 3) document.body.style.background = 'linear-gradient(135deg, #052e16, #166534)';
            else document.body.style.background = '#0a0a1a';
        }

        function claimNow() {
            const samples = ["😀","😂","🔥","⭐","🚀","🌈","🦄","⚡"];
            const random = samples[Math.floor(Math.random()*samples.length)];
            if (!collection[random]) collection[random] = {emoji: random, count: 0};
            collection[random].count++;
            localStorage.setItem('emojiCollection', JSON.stringify(collection));
            updateCollection();
            alert("✅ New emoji added!");
        }

        function switchTab(n) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab'+n).classList.add('active');
            
            if (n === 1) buildGallery();
            if (n === 2) buildLeaderboard();
            if (n === 4) buildSwords();
            if (n === 5) startBattle();
        }

        function startBattle() {
            const area = document.getElementById('battle-area');
            area.innerHTML = `<h3>Choose your fighter:</h3><div class="grid" id="fighters"></div>`;
            const grid = document.getElementById('fighters');
            Object.values(collection).forEach(item => {
                const div = document.createElement('div');
                div.className = 'emoji-card';
                div.innerHTML = item.emoji;
                div.onclick = () => battleWith(item.emoji);
                grid.appendChild(div);
            });
        }

        function battleWith(emoji) {
            document.getElementById('battle-log').innerHTML = `You sent out ${emoji}!<br>The Goblin attacked!<br><br>You won the battle! 🎉`;
        }

        // Timer
        let timeLeft = 60;
        setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) timeLeft = 60;
            document.getElementById('timer').textContent = timeLeft + "s";
        }, 1000);

        // Init
        updateCollection();
        buildLeaderboard();
    </script>
</body>
</html>
