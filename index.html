<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Miner ⏳</title>
    <style>
        :root { --bg: #0a0a1a; --accent: #7c3aed; }
        body {
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: #fff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        h1 { margin: 10px 0; font-size: 2.8rem; text-shadow: 0 0 20px var(--accent); }
        nav {
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        nav button {
            padding: 12px 18px;
            background: #1f1f2e;
            border: none;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        nav button.active { background: var(--accent); }
        .tab { display: none; }
        .tab.active { display: block; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
            gap: 16px;
            max-width: 1100px;
            margin: 25px auto;
        }
        .emoji-card {
            background: #16213e;
            border-radius: 18px;
            padding: 12px 8px;
            font-size: 3.5rem;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            text-align: center;
            cursor: pointer;
        }
        .gallery-emoji { filter: brightness(0.25) grayscale(1); font-size: 3.2rem; }

        .battle-log { 
            background: #111; 
            padding: 15px; 
            margin: 15px auto; 
            max-width: 600px; 
            border-radius: 12px;
            min-height: 200px;
            text-align: left;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>Emoji Miner ⏳</h1>
    
    <nav>
        <button onclick="switchTab(0)" class="active">Mine</button>
        <button onclick="switchTab(1)">Gallery</button>
        <button onclick="switchTab(2)">Leaderboard</button>
        <button onclick="switchTab(3)">Themes</button>
        <button onclick="switchTab(4)">Equipment</button>
        <button onclick="switchTab(5)">Dungeon</button>
    </nav>

    <!-- Mine, Gallery, etc. tabs (shortened for space) -->
    <div id="tab0" class="tab active"> ... Mine tab ... </div>
    <div id="tab1" class="tab"> ... Gallery ... </div>
    <!-- (I shortened other tabs in this message to save space) -->

    <!-- Equipment Tab -->
    <div id="tab4" class="tab">
        <h2>⚔️ Equipment - Swords</h2>
        <div class="grid" id="swords-grid"></div>
    </div>

    <!-- Dungeon Tab -->
    <div id="tab5" class="tab">
        <h2>🏰 Dungeon - Goblin Lair (1v1)</h2>
        <div id="battle-area"></div>
        <div class="battle-log" id="battle-log"></div>
        <button onclick="startBattle()" style="padding:12px 30px;">Start Battle</button>
    </div>
