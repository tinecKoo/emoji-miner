<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Miner ⏳</title>
    <style>
        :root {
            --bg: #0a0a1a;
            --accent: #7c3aed;
        }
        body {
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: #fff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        h1 { margin: 10px 0 5px; font-size: 2.8rem; text-shadow: 0 0 20px var(--accent); }
        nav {
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        nav button {
            padding: 12px 18px;
            background: #1f1f2e;
            border: none;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
        }
        nav button.active {
            background: var(--accent);
        }
        .tab { display: none; }
        .tab.active { display: block; }

        .timer {
            font-size: 2.8rem;
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
            gap: 16px;
            max-width: 1100px;
            margin: 25px auto;
        }
        .emoji-card {
            background: #16213e;
            border-radius: 18px;
            padding: 12px 8px;
            font-size: 3.6rem;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            transition: 0.3s;
            text-align: center;
            cursor: pointer;
        }
        .emoji-card:hover { transform: scale(1.08); }
        
        .gallery-emoji {
            filter: brightness(0.25) grayscale(1);
            font-size: 3.2rem;
            margin-bottom: 6px;
        }
        
        .stats {
            margin: 20px auto;
            padding: 15px;
            background: rgba(22,33,62,0.9);
            border-radius: 16px;
            max-width: 500px;
        }
        button.main {
            padding: 14px 28px;
            margin: 6px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        .gallery-info {
            font-size: 0.82rem;
            line-height: 1.1;
        }

        /* Equipment Styles */
        .equip-slot {
            border: 2px dashed #555;
            padding: 15px;
            margin: 10px;
            border-radius: 12px;
            min-height: 120px;
        }
    </style>
</head>
<body>
    <h1>Emoji Miner ⏳</h1>
    
    <nav>
        <button onclick="switchTab(0)" class="active">Mine</button>
        <button onclick="switchTab(1)">Gallery</button>
        <button onclick="switchTab(2)">Leaderboard</button>
        <button onclick="switchTab(3)">Themes</button>
        <button onclick="switchTab(4)">Equipment</button>
    </nav>

    <!-- Mine Tab -->
    <div id="tab0" class="tab active">
        <div class="timer" id="timer">Next in: 60s</div>
        <button class="main" onclick="claimNow()">Claim Early</button>
        <button onclick="exportCollection()">Export</button>
        <button onclick="saveToCloud()">Save Cloud</button>
        <button onclick="shareCollection()">Share</button>
        
        <div class="stats">
            <strong>Total:</strong> <span id="total">0</span> | 
            <strong>Unique:</strong> <span id="unique">0</span>
        </div>
        <div class="grid" id="collection"></div>
    </div>

    <!-- Gallery Tab -->
    <div id="tab1" class="tab">
        <h2>📖 Full Emoji Index</h2>
        <p>All emojis in black + drop chance</p>
        <div class="grid" id="gallery"></div>
    </div>

    <!-- Leaderboard Tab -->
    <div id="tab2" class="tab">
        <h2>🌍 Global Leaderboard</h2>
        <div id="leaderboard" style="font-size:1.3rem; max-width:600px; margin:30px auto;"></div>
    </div>

    <!-- Themes Tab -->
    <div id="tab3" class="tab">
        <h2>🎨 Choose Theme</h2>
        <button onclick="setTheme(0)">Default</button>
        <button onclick="setTheme(1)">Kayn (LoL)</button>
        <button onclick="setTheme(2)">Marin</button>
        <button onclick="setTheme(3)">Tren Twins</button>
    </div>

    <!-- Equipment Tab -->
    <div id="tab4" class="tab">
        <h2>⚔️ Equipment</h2>
        <p>Click an emoji to equip items</p>
        <div class="grid" id="equipment-grid"></div>
        
        <div style="margin-top:30px;">
            <h3>Available Equipment</h3>
            <div style="display:flex; flex-wrap:wrap; gap:15px; justify-content:center;">
                <div class="emoji-card" onclick="equipItem(this)">🗡️ Sword (+Luck)</div>
                <div class="emoji-card" onclick="equipItem(this)">🛡️ Armor (+Points)</div>
                <div class="emoji-card" onclick="equipItem(this)">🔮 Amulet (+Rare)</div>
            </div>
        </div>
    </div>

    <script>
        let emojis = [
            {emoji: "😀", name: "Grin", rarity: "common", chance: "45%"},
            {emoji: "😂", name: "Laugh", rarity: "common", chance: "30%"},
            {emoji: "❤️", name: "Heart", rarity: "common", chance: "30%"},
            {emoji: "🔥", name: "Fire", rarity: "uncommon", chance: "20%"},
            {emoji: "⭐", name: "Star", rarity: "uncommon", chance: "15%"},
            {emoji: "🚀", name: "Rocket", rarity: "uncommon", chance: "15%"},
            {emoji: "🌈", name: "Rainbow", rarity: "rare", chance: "10%"},
            {emoji: "🦄", name: "Unicorn", rarity: "rare", chance: "8%"},
            {emoji: "⚡", name: "Lightning", rarity: "epic", chance: "5%"},
            {emoji: "👑", name: "Crown", rarity: "epic", chance: "4%"},
            {emoji: "🐉", name: "Dragon", rarity: "legendary", chance: "2%"},
            {emoji: "🌌", name: "Galaxy", rarity: "legendary", chance: "1.5%"},
            {emoji: "🌸", name: "Sakura", rarity: "mythic", chance: "0.8%"},
            {emoji: "🦋", name: "Butterfly", rarity: "mythic", chance: "0.7%"},
            {emoji: "✨", name: "Divine", rarity: "divine", chance: "0.3%"}
        ];

        const secretKayn = {emoji: "🌑", name: "Shadow Kayn", rarity: "divine", chance: "0.1%"};

        let collection = JSON.parse(localStorage.getItem('emojiCollection')) || {};
        let lastClaim = parseInt(localStorage.getItem('lastClaim')) || 0;

        function saveCollection() {
            localStorage.setItem('emojiCollection', JSON.stringify(collection));
            localStorage.setItem('lastClaim', Date.now());
        }

        function updateDisplay() {
            const grid = document.getElementById('collection');
            grid.innerHTML = '';
            
            Object.values(collection).sort((a,b) => {
                const order = ['divine','mythic','legendary','epic','rare','uncommon','common'];
                return order.indexOf(a.rarity) - order.indexOf(b.rarity);
            }).forEach(item => {
                const div = document.createElement('div');
                div.className = `emoji-card ${item.rarity}`;
                div.innerHTML = `${item.emoji}<div style="font-size:0.8rem;margin-top:6px">${item.rarity.toUpperCase()}</div><small>x${item.count}</small>`;
                grid.appendChild(div);
            });

            let total = Object.values(collection).reduce((sum, item) => sum + item.count, 0);
            document.getElementById('total').textContent = total;
            document.getElementById('unique').textContent = Object.keys(collection).length;
        }

        function buildGallery() {
            const g = document.getElementById('gallery');
            g.innerHTML = '';
            [...emojis, secretKayn].forEach(e => {
                const div = document.createElement('div');
                div.className = 'emoji-card';
                div.innerHTML = `
                    <div class="gallery-emoji">${e.emoji}</div>
                    <div class="gallery-info">
                        <strong>${e.rarity.toUpperCase()}</strong><br>
                        ${e.chance} chance
                    </div>
                `;
                g.appendChild(div);
            });
        }

        function buildLeaderboard() {
            const unique = Object.keys(collection).length;
            document.getElementById('leaderboard').innerHTML = `
                <ol>
                    <li>1. TrenGod69 — 92 unique</li>
                    <li>2. ShadowReaper — 68 unique</li>
                    <li>3. MarinFan — 61 unique</li>
                    <li style="color:#c026d3"><strong>You — ${unique} unique 🔥</strong></li>
                    <li>5. GymBro420 — 47 unique</li>
                </ol>
            `;
        }

        function setTheme(n) {
            if (n === 1) document.body.style.background = 'linear-gradient(135deg, #1e0a2e, #4c1d95)';
            else if (n === 2) document.body.style.background = 'linear-gradient(135deg, #fce7f3, #831843)';
            else if (n === 3) document.body.style.background = 'linear-gradient(135deg, #052e16, #166534)';
            else document.body.style.background = 'linear-gradient(135deg, #0a0a1a, #1a1a2e)';
        }

        function getRandomEmoji() {
            const roll = Math.random();
            if (Object.keys(collection).length >= 25 && roll < 0.001) return secretKayn;
            return emojis[Math.floor(Math.random() * emojis.length)];
        }

        function claimNow() {
            const now = Date.now();
            if (now - lastClaim < 60000) return alert("⏳ Wait for the timer!");
            
            const emoji = getRandomEmoji();
            if (!collection[emoji.name]) collection[emoji.name] = {...emoji, count: 0};
            collection[emoji.name].count++;
            
            lastClaim = now;
            saveCollection();
            updateDisplay();
            buildLeaderboard();
        }

        function switchTab(n) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab'+n).classList.add('active');
            document.querySelectorAll('nav button').forEach((b,i) => b.classList.toggle('active', i===n));
            
            if (n === 1) buildGallery();
            if (n === 2) buildLeaderboard();
            if (n === 4) buildEquipment();
        }

        // Simple Equipment System
        function buildEquipment() {
            const grid = document.getElementById('equipment-grid');
            grid.innerHTML = '';
            Object.values(collection).forEach(item => {
                const div = document.createElement('div');
                div.className = 'emoji-card';
                div.innerHTML = `${item.emoji}<br><small>${item.rarity}</small>`;
                grid.appendChild(div);
            });
        }

        function equipItem(el) {
            alert("Equipped! (More equipment features coming soon)");
        }

        // Timer
        let timeLeft = 60;
        setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                claimNow();
                timeLeft = 60;
            }
            document.getElementById('timer').textContent = `Next in: ${timeLeft}s`;
        }, 1000);

        // Init
        updateDisplay();
        buildLeaderboard();
    </script>
</body>
</html>
