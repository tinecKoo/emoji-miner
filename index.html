<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Miner v1.2</title>
    <style>
        :root { --bg: #0a0a1a; --accent: #7c3aed; }
        body {
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: #fff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        h1 { text-align: center; font-size: 3rem; margin: 10px 0; text-shadow: 0 0 25px var(--accent); }
        nav { text-align: center; margin: 25px 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        nav button {
            padding: 12px 22px;
            background: #1f1f2e;
            border: none;
            color: white;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
        }
        nav button.active { background: var(--accent); box-shadow: 0 0 15px var(--accent); }

        .tab { display: none; }
        .tab.active { display: block; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 30px auto;
        }
        .emoji-card {
            background: #16213e;
            border-radius: 20px;
            padding: 15px;
            font-size: 3.8rem;
            text-align: center;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        .emoji-card:hover { transform: scale(1.12); }

        .rarity-name {
            font-size: 0.95rem;
            margin-top: 8px;
            font-weight: 500;
        }

        .common { border: 3px solid #9ca3af; }
        .uncommon { border: 3px solid #4ade80; }
        .rare { border: 3px solid #60a5fa; }
        .epic { border: 3px solid #c084fc; }
        .legendary { border: 3px solid #fbbf24; }
        .divine { border: 3px solid #a78bfa; box-shadow: 0 0 20px #a78bfa; }

        .health-bar {
            height: 14px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 8px 0;
        }
        .health-fill { height: 100%; background: #22c55e; transition: width 0.4s; }
        .battle-log {
            background: #111827;
            padding: 20px;
            border-radius: 16px;
            min-height: 240px;
            max-width: 700px;
            margin: 25px auto;
            text-align: left;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>Emoji Miner — v1.2</h1>
    
    <nav>
        <button onclick="switchTab(0)" class="active">Mine</button>
        <button onclick="switchTab(1)">Gallery</button>
        <button onclick="switchTab(2)">Leaderboard</button>
        <button onclick="switchTab(3)">Themes</button>
        <button onclick="switchTab(4)">Equipment</button>
        <button onclick="switchTab(5)">Dungeon</button>
    </nav>

    <!-- Mine Tab -->
    <div id="tab0" class="tab active">
        <p style="text-align:center; font-size:1.8rem;">Next in: <span id="timer" style="color:#ffd700;">60s</span></p>
        <div style="text-align:center; margin:20px;">
            <button onclick="claimNow()" style="padding:16px 40px; font-size:1.3rem; background:#7c3aed; border:none; border-radius:14px;">Claim Early</button>
        </div>
        <div class="grid" id="collection"></div>
    </div>

    <!-- Gallery -->
    <div id="tab1" class="tab">
        <h2>📖 Full Emoji Index</h2>
        <div class="grid" id="gallery"></div>
    </div>

    <!-- Leaderboard -->
    <div id="tab2" class="tab">
        <h2>🌍 Leaderboard</h2>
        <div id="leaderboard" style="max-width:600px; margin:30px auto; font-size:1.4rem;"></div>
    </div>

    <!-- Themes -->
    <div id="tab3" class="tab">
        <h2>🎨 Themes</h2>
        <div style="text-align:center; display:flex; flex-wrap:wrap; justify-content:center; gap:15px;">
            <button onclick="setTheme(0)">Default</button>
            <button onclick="setTheme(1)">Kayn (LoL)</button>
            <button onclick="setTheme(2)">Marin</button>
            <button onclick="setTheme(3)">Tren Twins</button>
        </div>
    </div>

    <!-- Equipment -->
    <div id="tab4" class="tab">
        <h2>⚔️ Equipment - Swords</h2>
        <div class="grid" id="swords-grid"></div>
    </div>

    <!-- Dungeon -->
    <div id="tab5" class="tab">
        <h2>🏰 Dungeon - Goblin Lair</h2>
        <div id="battle-area" style="text-align:center; margin:20px;"></div>
        <div class="battle-log" id="battle-log">Welcome! Win battles to earn swords.</div>
        <div style="text-align:center;">
            <button onclick="startBattle()" style="padding:16px 40px; font-size:1.2rem;">Start New Battle</button>
        </div>
    </div>

    <script>
        let collection = JSON.parse(localStorage.getItem('emojiCollection')) || {};
        let swords = JSON.parse(localStorage.getItem('swords')) || [];
        let battleActive = false;

        const allEmojis = [
            {emoji: "😀", name: "Grin", rarity: "common"},
            {emoji: "😂", name: "Laugh", rarity: "common"},
            {emoji: "❤️", name: "Heart", rarity: "common"},
            {emoji: "🔥", name: "Fire", rarity: "uncommon"},
            {emoji: "⭐", name: "Star", rarity: "uncommon"},
            {emoji: "🚀", name: "Rocket", rarity: "uncommon"},
            {emoji: "🌈", name: "Rainbow", rarity: "rare"},
            {emoji: "🦄", name: "Unicorn", rarity: "rare"},
            {emoji: "⚡", name: "Lightning", rarity: "epic"},
            {emoji: "👑", name: "Crown", rarity: "epic"},
            {emoji: "🐉", name: "Dragon", rarity: "legendary"},
            {emoji: "🌌", name: "Galaxy", rarity: "legendary"},
            {emoji: "🌑", name: "Shadow Kayn", rarity: "divine"}
        ];

        function getRarityClass(r) { return r.toLowerCase(); }

        function updateCollection() {
            const grid = document.getElementById('collection');
            grid.innerHTML = '';
            Object.values(collection).forEach(item => {
                const div = document.createElement('div');
                div.className = `emoji-card ${getRarityClass(item.rarity)}`;
                div.innerHTML = `${item.emoji}<div class="rarity-name">${item.name}</div>`;
                grid.appendChild(div);
            });
        }

        function buildGallery() {
            const g = document.getElementById('gallery');
            g.innerHTML = '';
            allEmojis.forEach(e => {
                const div = document.createElement('div');
                div.className = `emoji-card ${getRarityClass(e.rarity)}`;
                div.innerHTML = `${e.emoji}<div class="rarity-name">${e.name}</div>`;
                g.appendChild(div);
            });
        }

        function buildSwords() {
            const grid = document.getElementById('swords-grid');
            grid.innerHTML = '';
            swords.forEach(s => {
                const div = document.createElement('div');
                div.className = 'emoji-card';
                div.innerHTML = `⚔️<br><small>${s.name}<br>Power: ${s.power}</small>`;
                grid.appendChild(div);
            });
            if (swords.length === 0) grid.innerHTML += "<p style='grid-column:1/-1'>No swords yet. Win dungeons!</p>";
        }

        function buildLeaderboard() {
            const unique = Object.keys(collection).length;
            document.getElementById('leaderboard').innerHTML = `
                <ol>
                    <li>1. TrenGod69 — 98 unique</li>
                    <li>2. ShadowKayn — 71 unique</li>
                    <li style="color:#c026d3"><strong>You — ${unique} unique 🔥</strong></li>
                </ol>
            `;
        }

        function setTheme(n) {
            if (n === 1) document.body.style.background = 'linear-gradient(135deg, #1e0a2e, #4c1d95)';
            else if (n === 2) document.body.style.background = 'linear-gradient(135deg, #fce7f3, #831843)';
            else if (n === 3) document.body.style.background = 'linear-gradient(135deg, #052e16, #166534)';
            else document.body.style.background = '#0a0a1a';
        }

        function claimNow() {
            const random = allEmojis[Math.floor(Math.random() * allEmojis.length)];
            if (!collection[random.name]) collection[random.name] = {...random, count: 0};
            collection[random.name].count++;
            localStorage.setItem('emojiCollection', JSON.stringify(collection));
            updateCollection();
        }

        // === BATTLE SYSTEM ===
        let currentPlayer = null;
        let playerHP = 100;
        let enemyHP = 80;
        let rewardGiven = false;

        function startBattle() {
            rewardGiven = false;
            battleActive = true;
            const area = document.getElementById('battle-area');
            area.innerHTML = `<h3>Choose your fighter:</h3><div class="grid" id="fighter-select"></div>`;

            const select = document.getElementById('fighter-select');
            Object.values(collection).forEach(item => {
                const div = document.createElement('div');
                div.className = `emoji-card ${getRarityClass(item.rarity)}`;
                div.innerHTML = `${item.emoji}<div class="rarity-name">${item.name}</div>`;
                div.onclick = () => beginFight(item);
                select.appendChild(div);
            });
        }

        function beginFight(emoji) {
            currentPlayer = emoji;
            playerHP = 100;
            enemyHP = 80;
            rewardGiven = false;

            const area = document.getElementById('battle-area');
            area.innerHTML = `
                <div style="display:flex; justify-content:center; gap:60px; align-items:center; flex-wrap:wrap;">
                    <div style="text-align:center;">
                        <h3>${emoji.emoji} ${emoji.name}</h3>
                        <div class="health-bar"><div class="health-fill" id="player-health" style="width:100%"></div></div>
                        <span>HP: <span id="player-hp">100</span></span>
                    </div>
                    <div style="font-size:4.5rem;">VS</div>
                    <div style="text-align:center;">
                        <h3>👹 Goblin</h3>
                        <div class="health-bar"><div class="health-fill" id="enemy-health" style="width:100%"></div></div>
                        <span>HP: <span id="enemy-hp">80</span></span>
                    </div>
                </div>
                <div style="margin-top:25px;">
                    <button onclick="playerAttack()" style="padding:14px 36px; font-size:1.2rem;">Attack</button>
                </div>
            `;
        }

        function playerAttack() {
            if (!battleActive || enemyHP <= 0) return;

            const dmg = Math.floor(Math.random() * 22) + 15;
            enemyHP = Math.max(0, enemyHP - dmg);
            document.getElementById('enemy-hp').textContent = enemyHP;
            document.getElementById('enemy-health').style.width = (enemyHP / 80 * 100) + '%';

            document.getElementById('battle-log').innerHTML += `<br>→ You attacked! Dealt ${dmg} damage.`;

            if (enemyHP <= 0) {
                document.getElementById('battle-log').innerHTML += `<br><strong>🎉 Victory! You earned a new sword!</strong>`;
                if (!rewardGiven) {
                    swords.push({name: "Iron Sword", power: 25});
                    localStorage.setItem('swords', JSON.stringify(swords));
                    rewardGiven = true;
                }
                battleActive = false;
                return;
            }

            // Enemy attacks back
            setTimeout(() => {
                if (playerHP <= 0) return;
                const enemyDmg = Math.floor(Math.random() * 16) + 10;
                playerHP = Math.max(0, playerHP - enemyDmg);
                document.getElementById('player-hp').textContent = playerHP;
                document.getElementById('player-health').style.width = (playerHP / 100 * 100) + '%';

                document.getElementById('battle-log').innerHTML += `<br>← Goblin hit you for ${enemyDmg} damage!`;

                if (playerHP <= 0) {
                    document.getElementById('battle-log').innerHTML += `<br><strong>💀 You were defeated...</strong>`;
                    battleActive = false;
                }
            }, 800);
        }

        function switchTab(n) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab'+n).classList.add('active');
            
            if (n === 1) buildGallery();
            if (n === 2) buildLeaderboard();
            if (n === 4) buildSwords();
            if (n === 5) startBattle();
        }

        // Timer
        let timeLeft = 60;
        setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                claimNow();
                timeLeft = 60;
            }
            document.getElementById('timer').textContent = timeLeft + "s";
        }, 1000);

        // Init
        updateCollection();
        buildLeaderboard();
    </script>
</body>
</html>
